<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drift</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060818;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    /* ── Clock ── */
    #time {
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: clamp(3.5rem, 9vw, 8rem);
      font-weight: 300;
      color: rgba(255, 252, 238, 0.92);
      letter-spacing: 0.04em;
      text-shadow:
        0 0 60px rgba(0, 0, 0, 0.5),
        0 2px 8px rgba(0, 0, 0, 0.3);
      line-height: 1;
      pointer-events: none;
    }

    #date {
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: clamp(0.7rem, 1.4vw, 1rem);
      font-weight: 400;
      color: rgba(255, 252, 238, 0.55);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 1.4rem;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }

    /* ── Search bar ── */
    #search-wrap {
      margin-top: 2.8rem;
      width: min(520px, 80vw);
      position: relative;
    }

    #search-input {
      width: 100%;
      padding: 0.82rem 3rem 0.82rem 1.35rem;
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: clamp(0.85rem, 1.3vw, 1rem);
      color: rgba(255, 252, 238, 0.88);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 252, 238, 0.18);
      border-radius: 100px;
      outline: none;
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      letter-spacing: 0.03em;
      caret-color: rgba(255, 252, 238, 0.7);
      transition:
        background 0.3s ease,
        border-color 0.3s ease,
        box-shadow 0.3s ease;
    }

    #search-input::placeholder {
      color: rgba(255, 252, 238, 0.32);
    }

    #search-input:focus {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 252, 238, 0.38);
      box-shadow: 0 0 0 3px rgba(255, 252, 238, 0.07), 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    #search-icon {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.1rem;
      height: 1.1rem;
      opacity: 0.38;
      pointer-events: none;
    }

    /* ── Quick links ── */
    #quick-links {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: min(600px, 88vw);
    }

    .ql {
      display: flex;
      align-items: center;
      gap: 0.42rem;
      padding: 0.42rem 1rem 0.42rem 0.72rem;
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: rgba(255, 252, 238, 0.62);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 252, 238, 0.10);
      border-radius: 100px;
      text-decoration: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition:
        background 0.25s ease,
        color 0.25s ease,
        border-color 0.25s ease,
        transform 0.2s ease;
      white-space: nowrap;
    }

    .ql:hover {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 252, 238, 0.92);
      border-color: rgba(255, 252, 238, 0.25);
      transform: translateY(-1px);
    }

    .ql-favicon {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      object-fit: contain;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div id="time">12:00 pm</div>
    <div id="date">Monday, January 1</div>

    <div id="search-wrap">
      <input
        id="search-input"
        type="text"
        placeholder="Search or enter address"
        autocomplete="off"
        spellcheck="false"
      />
      <svg id="search-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,252,238,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>

    <div id="quick-links"></div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
