<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drift</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060818;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #time {
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: clamp(3.5rem, 9vw, 8rem);
      font-weight: 300;
      color: rgba(255, 252, 238, 0.92);
      letter-spacing: 0.04em;
      text-shadow:
        0 0 60px rgba(0, 0, 0, 0.5),
        0 2px 8px rgba(0, 0, 0, 0.3);
      line-height: 1;
    }

    #date {
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: clamp(0.7rem, 1.4vw, 1rem);
      font-weight: 400;
      color: rgba(255, 252, 238, 0.55);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.8rem;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.4);
    }

    #mood {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: 0.7rem;
      color: rgba(255, 252, 238, 0.3);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      z-index: 10;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="time">12:00 pm</div>
    <div id="date">Monday, January 1</div>
  </div>
  <div id="mood"></div>
  <script src="newtab.js"></script>
</body>
</html>
